<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Centro del Universo de Sofi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Outfit:wght@200;300;500;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <!-- Pantalla de entrada -->
    <div id="intro-screen">
        <div class="intro-inner">
            <span class="intro-heart">💘</span>
            <p class="intro-sub">Una carta escrita en las estrellas</p>
            <p class="intro-note">Cada vez que dudes de mi amor por ti,<br>visita esta página</p>
            <button id="enter-btn">Entrar al universo</button>
        </div>
    </div>

    <div id="experience-container">
        <canvas id="universe-canvas"></canvas>
        <div id="labels-container"></div>
        <div class="vignette"></div>

        <div class="ui-overlay">
            <header class="header">
                <h1>Sofi <span class="beat">💘</span></h1>
                <p>Tú eres el centro de mi universo</p>
            </header>

            <div class="instructions glass">
                <p>Arrastra para navegar · toca las estrellas <span style="color:#ffd700">doradas</span> ✦ para abrir un recuerdo</p>
            </div>
        </div>

        <!-- Control de música -->
        <button id="music-toggle" class="glass" title="Música">
            <span class="music-icon">♪</span>
        </button>
        <audio id="bg-music" loop>
            <source src="Julión Álvarez y su Norteño Banda - Lo Tienes Todo (Video Lyric).mp3" type="audio/mpeg">
        </audio>

        <!-- Pop-up de recuerdo -->
        <div id="memory-modal">
            <div class="modal-backdrop"></div>
            <div class="modal-card">
                <button id="modal-close" title="Cerrar">&times;</button>
                <div class="modal-photo"><img id="modal-img" alt="recuerdo"></div>
                <p id="modal-text"></p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
